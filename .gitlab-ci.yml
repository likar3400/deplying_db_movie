stages:
  - build
  - test
  - deploy

default:
  image: node:24

cache:
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build

test:
  stage: test
  script:
    - npm ci
    - npm run test
deploy:
  stage: deploy
  script:
    - flyctl auth login --access-token $(cat ~/.fly/config.yml | grep access_token | awk '{print $2}')
    - flyctl deploy --remote-only -a movie-js
    - export FLY_API_TOKEN=$(cat ~/.fly/config.yml | grep "^access_token" | cut -d' ' -f2)
    - flyctl deploy -a movie-js
  only:
    - main

